<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Moon">
<title>Moon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #0f0f0f;
    --card: #1a1a1a;
    --card2: #222;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #777;
    --accent: #f0a500;
    --green: #4aaa20;
    --green-bg: #0d1f08;
    --green-border: #1e4010;
    --yellow: #d4920a;
    --yellow-bg: #1f1800;
    --yellow-border: #3d3000;
    --red: #e03030;
    --red-bg: #1f0808;
    --red-border: #4a1010;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; padding-bottom: 3rem; }
  .header { padding: 2rem 1.5rem 0.75rem; display: flex; justify-content: space-between; align-items: flex-start; }
  .greeting { font-family: 'Bebas Neue', sans-serif; font-size: 44px; letter-spacing: 3px; line-height: 1; }
  .greeting em { color: var(--accent); font-style: normal; }
  .date-line { font-size: 12px; color: var(--muted); margin-top: 5px; font-weight: 300; }
  .admin-link { background: var(--card); border: 1px solid var(--border); border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; text-decoration: none; color: var(--muted); font-size: 15px; margin-top: 8px; flex-shrink: 0; }
  .page { padding: 0 1.25rem; }
  .status-strip { border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; }
  .status-strip.green { background: var(--green-bg); border-color: var(--green-border); }
  .status-strip.yellow { background: var(--yellow-bg); border-color: var(--yellow-border); }
  .status-strip.red { background: var(--red-bg); border-color: var(--red-border); }
  .status-strip.load { background: var(--card); border-color: var(--border); }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-strip.green .status-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-strip.yellow .status-dot { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
  .status-strip.red .status-dot { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .status-strip.load .status-dot { background: var(--muted); }
  .status-msg { font-size: 14px; font-weight: 500; line-height: 1.4; }
  .status-strip.green .status-msg { color: var(--green); }
  .status-strip.yellow .status-msg { color: var(--yellow); }
  .status-strip.red .status-msg { color: var(--red); }
  .status-strip.load .status-msg { color: var(--muted); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.875rem; margin-bottom: 0.875rem; }
  .bal-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 1.1rem; }
  .bal-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; font-weight: 500; }
  .bal-amount { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 1px; line-height: 1; color: var(--text); }
  .bal-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }
  .mustang-card { background: linear-gradient(135deg, #130f00, #1f1800); border: 1px solid #3a2c00; border-radius: 18px; padding: 1.25rem; margin-bottom: 0.875rem; }
  .mustang-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.1rem; }
  .mustang-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #7a6000; margin-bottom: 8px; font-weight: 500; }
  .mustang-amount { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 1px; line-height: 1; color: var(--accent); }
  .mustang-right { text-align: right; }
  .mustang-goal-label { font-size: 11px; color: #7a6000; margin-bottom: 4px; }
  .mustang-goal-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #c48000; letter-spacing: 1px; }
  .mustang-remaining { font-size: 12px; color: #7a6000; margin-top: 2px; }
  .progress-track { height: 6px; background: #2a1f00; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #c48000, #f0d060); border-radius: 3px; transition: width 1.2s ease; }
  .progress-pct { font-size: 12px; color: #7a6000; font-weight: 500; }
  .section-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 1.1rem 1.25rem; margin-bottom: 0.875rem; }
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; font-weight: 500; }
  .bill-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .bill-row:last-child { border-bottom: none; }
  .bill-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .bill-when { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .bill-amt { font-size: 16px; font-weight: 600; color: var(--text); }
  .bill-row.urgent .bill-name, .bill-row.urgent .bill-amt { color: var(--red); }
  .bill-row.urgent .bill-when { color: #c02020; }
  .bill-row.warning .bill-name { color: var(--yellow); }
  .bill-row.warning .bill-when { color: #b07800; }
  .all-clear-msg { font-size: 14px; color: var(--green); font-weight: 500; }
  .iou-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .iou-row:last-of-type { border-bottom: none; }
  .iou-person { font-size: 15px; font-weight: 500; color: var(--text); }
  .iou-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .iou-right { display: flex; align-items: center; gap: 10px; }
  .iou-amt { font-size: 15px; font-weight: 600; color: var(--accent); }
  .iou-x { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; padding: 2px 5px; border-radius: 4px; line-height: 1; }
  .iou-x:hover { color: var(--red); }
  .iou-add { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .iou-add input { padding: 9px 11px; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; }
  .iou-add input:focus { outline: none; border-color: var(--accent); }
  .iou-add input::placeholder { color: var(--muted); }
  .i-name { flex: 1; min-width: 90px; }
  .i-amt { width: 72px; }
  .i-desc { flex: 1; min-width: 90px; }
  .iou-log-btn { padding: 9px 16px; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; color: var(--accent); font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
  .iou-log-btn:hover { border-color: var(--accent); }
  .no-items { font-size: 13px; color: var(--muted); font-style: italic; }
  .night-btn { width: 100%; padding: 15px; background: var(--yellow-bg); border: 1.5px solid var(--accent); border-radius: 16px; color: var(--accent); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; cursor: pointer; margin-bottom: 0.875rem; }
  .night-status { border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 0.875rem; font-size: 14px; font-weight: 500; text-align: center; }
  .night-status.pending { background: var(--yellow-bg); border: 1px solid var(--yellow-border); color: var(--yellow); }
  .night-status.approved { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }
  .night-status.declined { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
  .refresh-btn { display: block; margin: 1.25rem auto 0; background: none; border: 1px solid var(--border); border-radius: 50px; padding: 9px 28px; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .refresh-btn:hover { border-color: var(--muted); color: var(--text); }
  .updated { text-align: center; font-size: 11px; color: #333; margin-top: 8px; }
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); border-radius: 50px; padding: 10px 24px; font-size: 13px; color: var(--text); opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="greeting">Hey <em>Moon</em></div>
    <div class="date-line" id="date-line"></div>
  </div>
  <a href="/admin" class="admin-link">⚙</a>
</div>
<div class="page" id="page">
  <div class="status-strip load">
    <div class="status-dot"></div>
    <div class="status-msg">Loading your money...</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const now=new Date();
document.getElementById('date-line').textContent=`${dayNames[now.getDay()]}, ${monthNames[now.getMonth()]} ${now.getDate()}`;

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function fmtBal(n){if(n===null||n===undefined)return'—';return'$'+Math.floor(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fmtAmt(n){return'$'+parseFloat(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function freqLabel(b) {
  const freq = b.frequency || 'monthly';
  const days = b.daysUntilDue;
  if (days === 0) return 'Due TODAY';
  if (days === 1) return 'Due tomorrow';
  const base = `In ${days} days`;
  if (freq === 'weekly') return `${base} — every ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][parseInt(b.dayOfWeek)||0]}`;
  if (freq === 'biweekly') return `${base} — every 2 weeks`;
  if (freq === 'monthly') { const d=parseInt(b.dayOfMonth)||1; return `${base} — the ${d}${ordinal(d)}`; }
  if (freq === 'quarterly') return `${base} — quarterly`;
  if (freq === 'annual') return `${base} — annual`;
  return base;
}

async function removeIOU(id){await fetch('/api/iou/remove',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});load();}

async function addIOU(){
  const person=document.getElementById('i-name').value.trim();
  const amount=document.getElementById('i-amt').value.trim();
  const desc=document.getElementById('i-desc').value.trim();
  if(!person||!amount){showToast('Enter a name and amount');return;}
  await fetch('/api/iou/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({person,amount,description:desc})});
  showToast('IOU logged ✓');load();
}

async function requestNightOut(){await fetch('/api/nightout/request',{method:'POST'});showToast('Request sent to Mom ✓');load();}

async function load(){
  const page=document.getElementById('page');
  try{
    const res=await fetch('/api/status');
    const d=await res.json();
    if(!d.connected){
      page.innerHTML=`<div class="status-strip load"><div class="status-dot"></div><div class="status-msg">Not connected — ask Mom to set up the accounts</div></div>`;
      return;
    }
    const sc=d.statusColor||'green';

    let billsContent='';
    if(d.bills&&d.bills.length){
      billsContent=d.bills.sort((a,b)=>a.daysUntilDue-b.daysUntilDue).map(b=>{
        const urgent=b.daysUntilDue<=5;
        const warning=!urgent&&b.daysUntilDue<=10;
        const cls=urgent?'urgent':warning?'warning':'';
        const when = freqLabel(b);
        return`<div class="bill-row ${cls}"><div><div class="bill-name">${b.name}</div><div class="bill-when">${when}</div></div><div class="bill-amt">${fmtAmt(b.amount)}</div></div>`;
      }).join('');
    }else{billsContent=`<div class="all-clear-msg">✓ No bills set up yet</div>`;}

    let iouContent='';
    if(d.ious&&d.ious.length){
      iouContent=d.ious.map(i=>`<div class="iou-row"><div><div class="iou-person">You owe ${i.person}</div>${i.description?`<div class="iou-desc">${i.description}</div>`:''}</div><div class="iou-right"><div class="iou-amt">${fmtAmt(i.amount)}</div><button class="iou-x" onclick="removeIOU(${i.id})">×</button></div></div>`).join('');
    }else{iouContent=`<div class="no-items" style="margin-bottom:10px;">You're all square — nobody to pay back.</div>`;}

    const mustang=d.mustangFund??0;
    const goal=d.mustangGoal||8000;
    const pct=Math.min(100,(mustang/goal)*100);
    const remaining=Math.max(0,goal-mustang);

    let nightHtml='';
    const req=d.nightOutRequest;
    if(req&&req.status==='pending'){nightHtml=`<div class="night-status pending">⏳ Waiting for Mom...</div>`;}
    else if(req&&req.status==='approved'){nightHtml=`<div class="night-status approved">✓ Mom said yes — $10 extra tonight</div>`;}
    else if(req&&req.status==='declined'){nightHtml=`<div class="night-status declined">Not tonight — Mom said no</div>`;}
    else if(d.showNightOutButton){nightHtml=`<button class="night-btn" onclick="requestNightOut()">ASK FOR TONIGHT MONEY</button>`;}

    page.innerHTML=`
      <div class="status-strip ${sc}"><div class="status-dot"></div><div class="status-msg">${d.statusMessage||''}</div></div>
      <div class="two-col">
        <div class="bal-card"><div class="bal-label">Fun Money</div><div class="bal-amount">${fmtBal(d.funMoney)}</div><div class="bal-sub">today's balance</div></div>
        <div class="bal-card"><div class="bal-label">Gas Card</div><div class="bal-amount">${fmtBal(d.gasMoney)}</div><div class="bal-sub">pump only</div></div>
      </div>
      <div class="mustang-card">
        <div class="mustang-header">
          <div><div class="mustang-label">🏁 Mustang Fund</div><div class="mustang-amount">${fmtBal(mustang)}</div></div>
          <div class="mustang-right"><div class="mustang-goal-label">Goal</div><div class="mustang-goal-num">${fmtBal(goal)}</div><div class="mustang-remaining">${fmtBal(remaining)} to go</div></div>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct.toFixed(1)}%"></div></div>
        <div class="progress-pct">${pct.toFixed(1)}% of the way there</div>
      </div>
      <div class="section-card"><div class="section-label">Bills</div>${billsContent}</div>
      ${nightHtml}
      <div class="section-card">
        <div class="section-label">IOUs — What You Owe</div>
        ${iouContent}
        <div class="iou-add">
          <input class="i-name" type="text" id="i-name" placeholder="Who paid?" maxlength="30">
          <input class="i-amt" type="number" id="i-amt" placeholder="$" min="0" step="0.01">
          <input class="i-desc" type="text" id="i-desc" placeholder="For what?" maxlength="40">
          <button class="iou-log-btn" onclick="addIOU()">+ Log IOU</button>
        </div>
      </div>
      <button class="refresh-btn" onclick="load()">↻ Refresh</button>
      <div class="updated">Updated just now</div>`;
  }catch(e){
    page.innerHTML=`<div class="status-strip red"><div class="status-dot"></div><div class="status-msg">Can't connect — check your internet</div></div><button class="refresh-btn" onclick="load()" style="margin-top:1rem;">↻ Try again</button>`;
  }
}
load();
</script>
</body>
</html>
