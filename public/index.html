<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Moon">
<title>Moon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --yes: #3d7a1e;
    --yes-bg: #d4edaa;
    --yes-mid: #5aab28;
    --wait: #8a5200;
    --wait-bg: #fde8b0;
    --wait-mid: #f0a500;
    --no: #8b1a1a;
    --no-bg: #fad0d0;
    --no-mid: #e03030;
    --dark: #0f0f0f;
    --card: #1a1a1a;
    --card2: #222;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #f0a500;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 2rem;
  }

  .header {
    padding: 2rem 1.5rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .greeting {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    line-height: 1;
    color: var(--text);
  }

  .greeting span {
    color: var(--accent);
  }

  .date-line {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 300;
  }

  .admin-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--muted);
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 6px;
  }

  .page { padding: 0 1.25rem; }

  /* ── Decision block ── */
  .decision-block {
    border-radius: 20px;
    padding: 2.5rem 1.75rem 2rem;
    text-align: center;
    margin-bottom: 1rem;
    transition: background 0.4s, border-color 0.4s;
    border: 1.5px solid transparent;
    position: relative;
    overflow: hidden;
  }

  .decision-block::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.06;
    background: repeating-linear-gradient(
      45deg,
      currentColor,
      currentColor 1px,
      transparent 1px,
      transparent 12px
    );
  }

  .decision-block.yes  { background: var(--yes-bg);  border-color: var(--yes-mid);  color: var(--yes); }
  .decision-block.wait { background: var(--wait-bg); border-color: var(--wait-mid); color: var(--wait); }
  .decision-block.no   { background: var(--no-bg);   border-color: var(--no-mid);   color: var(--no); }
  .decision-block.load { background: var(--card);    border-color: var(--border);   color: var(--muted); }

  .big-word {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    line-height: 1;
    letter-spacing: 4px;
    margin-bottom: 0.5rem;
    position: relative;
  }

  .decision-block.load .big-word { font-size: 60px; letter-spacing: 1px; }

  .decision-headline {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 0.4rem;
    position: relative;
  }

  .decision-reason {
    font-size: 16px;
    font-weight: 400;
    line-height: 1.5;
    position: relative;
    opacity: 0.85;
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.1rem 1.25rem;
    margin-bottom: 0.875rem;
  }

  .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .money-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    justify-content: space-between;
  }

  .money-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 1px;
    line-height: 1;
    color: var(--text);
  }

  .money-sub {
    font-size: 13px;
    color: var(--muted);
    text-align: right;
    line-height: 1.4;
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.875rem;
    margin-bottom: 0.875rem;
  }

  .two-col .card {
    margin-bottom: 0;
  }

  .two-col .money-amount {
    font-size: 36px;
  }

  /* ── Mustang fund ── */
  .mustang-card {
    background: linear-gradient(135deg, #1a1500 0%, #2a1f00 100%);
    border-color: #3d2e00;
  }

  .mustang-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
  }

  .mustang-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 1px;
    color: var(--accent);
    line-height: 1;
  }

  .mustang-goal {
    font-size: 13px;
    color: #8a6d00;
    text-align: right;
    line-height: 1.4;
  }

  .progress-track {
    height: 8px;
    background: #2a1f00;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 6px;
    border: 1px solid #3d2e00;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #f0a500, #ffd14d);
    border-radius: 4px;
    transition: width 1s ease;
  }

  .progress-label {
    font-size: 12px;
    color: #8a6d00;
  }

  /* ── Bills ── */
  .bill-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .bill-item:last-child { border-bottom: none; }

  .bill-name { color: var(--text); font-weight: 500; }
  .bill-when { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .bill-amt { color: var(--text); font-weight: 600; font-size: 15px; }
  .bill-urgent .bill-name,
  .bill-urgent .bill-amt { color: #e03030; }
  .bill-urgent .bill-when { color: #c02020; }

  .all-clear {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--yes);
    font-weight: 500;
  }

  /* ── IOUs ── */
  .iou-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .iou-item:last-child { border-bottom: none; }
  .iou-person { font-size: 14px; font-weight: 500; color: var(--text); }
  .iou-desc { font-size: 12px; color: var(--muted); }
  .iou-right { display: flex; align-items: center; gap: 10px; }
  .iou-amt { font-size: 15px; font-weight: 600; color: var(--accent); }
  .iou-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 4px; }
  .iou-remove:hover { color: #e03030; }

  .add-iou-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .add-iou-row input {
    flex: 1;
    min-width: 80px;
    padding: 8px 10px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
  }

  .add-iou-row input:focus { outline: none; border-color: var(--accent); }
  .add-iou-row input::placeholder { color: var(--muted); }

  .add-iou-btn {
    padding: 8px 16px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }

  .add-iou-btn:hover { border-color: var(--accent); }

  /* ── Night out button ── */
  .night-out-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #1a1500, #2a1f00);
    border: 1.5px solid var(--accent);
    border-radius: 16px;
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-bottom: 0.875rem;
    transition: all 0.2s;
  }

  .night-out-btn:hover { background: #2a1f00; }
  .night-out-btn:disabled { opacity: 0.5; cursor: default; }

  .night-out-status {
    text-align: center;
    font-size: 14px;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 0.875rem;
    font-weight: 500;
  }

  .night-out-status.pending { background: #1a1500; color: var(--accent); border: 1px solid #3d2e00; }
  .night-out-status.approved { background: #0d1a08; color: var(--yes); border: 1px solid #2d5a1a; }
  .night-out-status.declined { background: #1a0808; color: var(--no); border: 1px solid #5a1a1a; }

  /* ── Refresh ── */
  .refresh-btn {
    display: block;
    margin: 1rem auto 0;
    background: none;
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 24px;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .refresh-btn:hover { border-color: var(--muted); color: var(--text); }

  .last-updated {
    text-align: center;
    font-size: 11px;
    color: #444;
    margin-top: 8px;
  }

  /* ── IOU add form toast ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 24px;
    font-size: 14px;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="greeting">Hey <span>Moon</span></div>
    <div class="date-line" id="date-line"></div>
  </div>
  <a href="/admin" class="admin-btn" title="Admin">⚙</a>
</div>

<div class="page" id="page">
  <div class="decision-block load">
    <div class="big-word">...</div>
    <div class="decision-headline">Loading your money</div>
    <div class="decision-reason">Just a second</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Date
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const now = new Date();
document.getElementById('date-line').textContent =
  `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return '$' + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

async function removeIOU(id) {
  await fetch('/api/iou/remove', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ id })
  });
  load();
}

async function addIOU() {
  const person = document.getElementById('iou-person').value.trim();
  const amount = document.getElementById('iou-amount').value.trim();
  const desc = document.getElementById('iou-desc').value.trim();
  if (!person || !amount) { showToast('Enter a name and amount'); return; }
  await fetch('/api/iou/add', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ person, amount, description: desc })
  });
  showToast('IOU logged ✓');
  load();
}

async function requestNightOut() {
  await fetch('/api/nightout/request', { method: 'POST' });
  showToast('Request sent to Mom ✓');
  load();
}

async function load() {
  const page = document.getElementById('page');
  try {
    const res = await fetch('/api/status');
    const d = await res.json();

    if (!d.connected) {
      page.innerHTML = `
        <div class="decision-block load">
          <div class="big-word" style="font-size:50px;letter-spacing:1px">NOT SET UP</div>
          <div class="decision-headline">Ask Mom to connect your accounts</div>
          <div class="decision-reason">The dashboard isn't connected yet.</div>
        </div>`;
      return;
    }

    const cls = (d.decision || 'load').toLowerCase();

    // Bills HTML
    let billsHtml = '';
    if (d.bills && d.bills.length) {
      const items = d.bills.map(b => {
        const days = parseInt(b.daysUntilDue) || 0;
        const urgent = days <= 3;
        const when = days === 0 ? 'Due TODAY' : days === 1 ? 'Due tomorrow' : `In ${days} days`;
        return `<div class="bill-item${urgent ? ' bill-urgent' : ''}">
          <div>
            <div class="bill-name">${b.name}</div>
            <div class="bill-when">${when}</div>
          </div>
          <div class="bill-amt">${fmt(b.amount)}</div>
        </div>`;
      }).join('');
      billsHtml = `<div class="card">
        <div class="card-label">Bills</div>
        ${items}
      </div>`;
    } else {
      billsHtml = `<div class="card">
        <div class="card-label">Bills</div>
        <div class="all-clear">✓ All bills are covered</div>
      </div>`;
    }

    // IOUs HTML
    let iouHtml = '';
    if (d.ious && d.ious.length) {
      const items = d.ious.map(i => `
        <div class="iou-item">
          <div>
            <div class="iou-person">You owe ${i.person}</div>
            ${i.description ? `<div class="iou-desc">${i.description}</div>` : ''}
          </div>
          <div class="iou-right">
            <div class="iou-amt">${fmt(i.amount)}</div>
            <button class="iou-remove" onclick="removeIOU(${i.id})" aria-label="Mark paid">×</button>
          </div>
        </div>`).join('');
      iouHtml = `<div class="card">
        <div class="card-label">You owe</div>
        ${items}
        <div class="add-iou-row">
          <input type="text" id="iou-person" placeholder="Who?" maxlength="30">
          <input type="number" id="iou-amount" placeholder="$" min="0" step="0.01" style="width:70px;flex:none;">
          <input type="text" id="iou-desc" placeholder="For what?" maxlength="40">
          <button class="add-iou-btn" onclick="addIOU()">+ Add</button>
        </div>
      </div>`;
    } else {
      iouHtml = `<div class="card">
        <div class="card-label">IOUs</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:10px;">You're all square. No one to pay back.</div>
        <div class="add-iou-row">
          <input type="text" id="iou-person" placeholder="Who paid for you?" maxlength="30">
          <input type="number" id="iou-amount" placeholder="$" min="0" step="0.01" style="width:70px;flex:none;">
          <input type="text" id="iou-desc" placeholder="For what?" maxlength="40">
          <button class="add-iou-btn" onclick="addIOU()">+ Log IOU</button>
        </div>
      </div>`;
    }

    // Mustang fund
    const mustang = d.mustangFund ?? 0;
    const goal = d.mustangGoal || 8000;
    const pct = Math.min(100, (mustang / goal) * 100).toFixed(1);
    const remaining = Math.max(0, goal - mustang);
    const mustangHtml = `<div class="card mustang-card">
      <div class="card-label" style="color:#8a6d00;">🏁 Mustang Fund</div>
      <div class="mustang-top">
        <div class="mustang-amount">${fmt(mustang)}</div>
        <div class="mustang-goal">Goal: ${fmt(goal)}<br>${fmt(remaining)} to go</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="progress-label">${pct}% there</div>
    </div>`;

    // Night out button
    let nightHtml = '';
    if (d.nightOutRequest && d.nightOutRequest.status === 'pending') {
      nightHtml = `<div class="night-out-status pending">⏳ Waiting for Mom to respond...</div>`;
    } else if (d.nightOutRequest && d.nightOutRequest.status === 'approved') {
      nightHtml = `<div class="night-out-status approved">✓ Mom said yes — $10 extra tonight</div>`;
    } else if (d.nightOutRequest && d.nightOutRequest.status === 'declined') {
      nightHtml = `<div class="night-out-status declined">Mom said not tonight</div>`;
    } else if (d.showNightOutButton) {
      nightHtml = `<button class="night-out-btn" onclick="requestNightOut()">ASK FOR TONIGHT MONEY</button>`;
    }

    page.innerHTML = `
      <div class="decision-block ${cls}">
        <div class="big-word">${d.decision || '?'}</div>
        <div class="decision-headline">${d.headline || ''}</div>
        <div class="decision-reason">${d.reason || ''}</div>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-label">Fun Money</div>
          <div class="money-amount">${d.funMoney !== null ? '$' + Math.floor(d.funMoney) : '—'}</div>
          <div class="money-sub">today's balance</div>
        </div>
        <div class="card">
          <div class="card-label">Gas Card</div>
          <div class="money-amount">${d.gasMoney !== null ? '$' + Math.floor(d.gasMoney) : '—'}</div>
          <div class="money-sub">pump only</div>
        </div>
      </div>

      ${mustangHtml}
      ${billsHtml}
      ${nightHtml}
      ${iouHtml}

      <button class="refresh-btn" onclick="load()">↻ Refresh</button>
      <div class="last-updated">Updated just now</div>
    `;

  } catch(e) {
    page.innerHTML = `
      <div class="decision-block load">
        <div class="big-word" style="font-size:40px;letter-spacing:0">NO CONNECTION</div>
        <div class="decision-headline">Can't reach the server</div>
        <div class="decision-reason">Check your internet and try again.</div>
      </div>
      <button class="refresh-btn" onclick="load()">↻ Try again</button>`;
  }
}

load();
</script>
</body>
</html>
